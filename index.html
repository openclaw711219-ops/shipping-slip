<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BABY尋寶趣 出貨單產生器</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", sans-serif; background: #f5f5f5; color: #000; }
  
  .upload-area {
    max-width: 600px; margin: 40px auto; padding: 40px; text-align: center;
    background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.1);
  }
  .upload-area h1 { font-size: 22px; margin-bottom: 8px; }
  .upload-area p { color: #666; margin-bottom: 20px; }
  .upload-area input[type=file] { display: none; }
  .upload-btn {
    display: inline-block; padding: 12px 32px; background: #e91e63; color: #fff;
    border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold;
  }
  .upload-btn:hover { background: #c2185b; }
  
  .summary {
    max-width: 600px; margin: 20px auto; padding: 20px; background: #fff;
    border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.1);
  }
  .summary h2 { font-size: 18px; margin-bottom: 12px; }
  .summary .stats { display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
  .summary .stat { background: #fce4ec; padding: 12px 20px; border-radius: 8px; }
  .summary .stat .num { font-size: 24px; font-weight: bold; color: #e91e63; }
  .summary .stat .label { font-size: 13px; color: #666; }
  .date-input { margin-bottom: 16px; font-size: 15px; }
  .date-input label { font-weight: bold; margin-right: 8px; }
  .date-input input {
    padding: 8px 12px; font-size: 15px; border: 2px solid #e91e63; border-radius: 6px; font-family: inherit;
  }
  .print-btn {
    padding: 12px 32px; background: #4caf50; color: #fff; border: none;
    border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold;
  }
  .print-btn:hover { background: #388e3c; }
  .reset-btn {
    padding: 12px 24px; background: #9e9e9e; color: #fff; border: none;
    border-radius: 8px; cursor: pointer; font-size: 14px; margin-left: 12px;
  }

  .slips-container { display: none; }

  /* === Shared slip styles === */
  .slip {
    width: 148mm; min-height: 200mm;
    background: #fff; margin: 16px auto; padding: 3mm 5mm;
    font-size: 12pt; position: relative;
    overflow: hidden;
  }

  .slip-header {
    display: flex;
    align-items: flex-start;
    margin-bottom: 4px;
    border-bottom: 2px solid #000;
    padding-bottom: 4px;
  }
  .slip-header-left { flex: 1; text-align: center; padding-left: 25mm; }
  .slip-header-right { width: 25mm; text-align: right; }

  .slip-header-left .company {
    font-size: 18pt; font-weight: bold;
  }
  .slip-header-left .subtitle {
    font-size: 11pt; color: #333; margin-top: 2px;
  }
  .slip-header-left .notice {
    font-size: 7.5pt; line-height: 1.4; margin-top: 4px; color: #000; text-align: left;
  }

  .slip-info { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 13pt; }
  
  .slip table { width: 100%; border-collapse: collapse; font-size: 12pt; table-layout: fixed; }
  .slip th, .slip td { border: 1px solid #000; padding: 2px 4px; text-align: left; }
  .slip th { background: #eee; font-weight: bold; text-align: center; }
  
  /* 單行截斷設定 */
  .slip td { white-space: nowrap; overflow: hidden; text-overflow: clip; height: 6.5mm; line-height: 6mm; vertical-align: middle; }
  
  .slip td.center { text-align: center; }
  .slip td.right { text-align: right; }
  
  /* 欄位寬度優化：單價與數量縮窄，明細加寬 */
  .col-prod { width: 42%; }
  .col-detail { width: 44%; }
  .col-price { width: 7%; }
  .col-qty { width: 7%; }

  .slip-bottom { display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; padding-top: 4px; }
  .slip-footer { font-size: 8pt; color: #333; flex: 1; }
  .slip-footer ul { list-style: disc; padding-left: 14px; margin: 0; }
  .slip-footer li { margin-bottom: 1px; }
  .slip-total { font-size: 14pt; font-weight: bold; white-space: nowrap; padding-left: 12px; }

  .badge {
    display: inline-block; color: #000; background: #fff;
    padding: 0px 4px; border: 1.5px solid #000; border-radius: 2px;
    font-size: 9pt; margin-right: 4px; vertical-align: middle; font-weight: bold;
  }

  /* Screen preview */
  .preview .slip {
    box-shadow: 0 2px 8px rgba(0,0,0,.1);
  }

  @media print {
    body { background: #fff; }
    .upload-area, .summary { display: none !important; }
    .slips-container { display: block !important; }
    @page { size: A5 portrait; margin: 0mm; }
    .slip {
      width: 100%;
      margin: 0;
      border: none;
      min-height: 0 !important;
      height: 210mm;
      padding: 5mm 7mm;
    }
    .slip + .slip { page-break-before: always; }
  }
</style>
</head>
<body>

<div class="upload-area" id="uploadArea">
  <h1>📦 BABY尋寶趣 出貨單產生器</h1>
  <p>上傳 Excel 檔案，自動產生所有客戶的出貨單</p>
  <label class="upload-btn" for="fileInput">選擇 Excel 檔案</label>
  <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
</div>

<div class="summary" id="summary" style="display:none;">
  <h2>📊 資料摘要</h2>
  <div class="stats">
    <div class="stat"><div class="num" id="statCustomers">0</div><div class="label">客戶數</div></div>
    <div class="stat"><div class="num" id="statProducts">0</div><div class="label">商品筆數</div></div>
  </div>
  <div class="date-input">
    <label for="closeDate">📅 結單日：BABY尋寶趣-</label>
    <input type="text" id="closeDate" placeholder="26/1/10"> 結單
  </div>
  <button class="print-btn" onclick="renderAndPrint()">🖨️ 列印出貨單</button>
  <button class="reset-btn" onclick="location.reload()">重新上傳</button>
</div>

<div class="slips-container preview" id="slipsContainer"></div>

<script>
const COL = { NAME: 0, CUSTOMER: 1, PRICE: 2, QTY: 3, AMOUNT: 4, DETAIL: 5, NOTE: 6, ID: 11 };
let currentCustomers = [];

document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const wb = XLSX.read(ev.target.result, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    processData(raw);
  };
  reader.readAsArrayBuffer(file);
});

function processData(rows) {
  let startIdx = 0;
  for (let i = 0; i < Math.min(rows.length, 10); i++) {
    if (rows[i][COL.CUSTOMER] && !/客戶|姓名/i.test(rows[i][COL.CUSTOMER])) { startIdx = i; break; }
  }

  const grouped = {};
  let totalProducts = 0;

  for (let i = startIdx; i < rows.length; i++) {
    const row = rows[i];
    const custName = String(row[COL.CUSTOMER] || '').trim();
    if (!custName) continue;

    if (!grouped[custName]) {
      grouped[custName] = { id: row[COL.ID], name: custName, items: [] };
    }

    grouped[custName].items.push({
      product: String(row[COL.NAME] || '').trim(),
      detail: String(row[COL.DETAIL] || '').trim(),
      price: row[COL.PRICE],
      qty: row[COL.QTY],
      note: String(row[COL.NOTE] || '').trim()
    });
    totalProducts++;
  }

  currentCustomers = Object.values(grouped);
  document.getElementById('statCustomers').textContent = currentCustomers.length;
  document.getElementById('statProducts').textContent = totalProducts;
  document.getElementById('summary').style.display = 'block';
  document.getElementById('uploadArea').style.display = 'none';
  renderSlips();
}

function renderSlips() {
  const container = document.getElementById('slipsContainer');
  container.style.display = 'block';
  const dateStr = document.getElementById('closeDate').value;

  let html = '';
  currentCustomers.forEach((cust) => {
    let totalQty = 0;
    let rowsHtml = '';
    
    // 分類：退款、一般、待補寄
    const refund = cust.items.filter(i => i.note === '退款');
    const normal = cust.items.filter(i => i.note !== '退款' && i.note !== '待補寄');
    const pending = cust.items.filter(i => i.note === '待補寄');
    const shipItems = [...refund, ...normal];
    const shipQty = shipItems.reduce((s, i) => s + (Number(i.qty)||0), 0);

    shipItems.forEach((item) => {
      const prefix = item.note === '退款' ? '<span class="badge">退款</span>' : '';
      rowsHtml += `<tr>
        <td class="col-prod">${prefix}${esc(item.product)}</td>
        <td class="col-detail">${esc(item.detail)}</td>
        <td class="center col-price">${item.price}</td>
        <td class="center col-qty">${item.qty}</td>
      </tr>`;
    });

    if (pending.length) {
      rowsHtml += `<tr><td colspan="4" style="background:#eee;font-weight:bold;height:5mm;font-size:9pt;">▼ 待補寄（本次不出貨）</td></tr>`;
      pending.forEach(item => {
        rowsHtml += `<tr>
          <td class="col-prod"><span class="badge">待補寄</span>${esc(item.product)}</td>
          <td class="col-detail">${esc(item.detail)}</td>
          <td class="center col-price">${item.price}</td>
          <td class="center col-qty">${item.qty}</td>
        </tr>`;
      });
    }

    html += `
    <div class="slip">
      <div class="slip-header">
        <div class="slip-header-left">
          <div class="company">༺ BABY尋寶趣 ༻</div>
          <div class="subtitle">✿ 出貨明細單 ✿</div>
          <div class="notice">媽咪您好，附上此次購買明細，若有待補寄/退款字樣部分，再請媽咪特別留意喔，感謝您<br>• 待補寄：待商品到貨後會盡快補寄給媽咪喔<br>• 退款：因廠商尚未有正確到貨時間，避免媽咪久候先退款給媽咪</div>
        </div>
        <div class="slip-header-right">
          <div class="qrcode"></div>
        </div>
      </div>
      <div class="slip-info">
        <div>編號：<span style="font-size:16pt;font-weight:bold;">${cust.id}</span></div>
        <div>客戶：<span style="font-size:14pt;font-weight:bold;">${cust.name}</span></div>
        <div style="font-size:11pt;">&lt;${dateStr}結單&gt;</div>
      </div>
      <table>
        <thead>
          <tr>
            <th class="col-prod">品名</th>
            <th class="col-detail">明細</th>
            <th class="col-price">單價</th>
            <th class="col-qty">數量</th>
          </tr>
        </thead>
        <tbody>${rowsHtml}</tbody>
      </table>
      <div class="slip-bottom">
        <div class="slip-footer">
          <ul>
            <li>感謝您的訂購！如有任何問題，請聯繫 Line官方客服 @574uvbwp</li>
          </ul>
        </div>
        <div class="slip-total">合計：${shipQty} 件</div>
      </div>
    </div>`;
  });

  container.innerHTML = html;
}

function renderAndPrint() {
  renderSlips();
  setTimeout(() => { window.print(); }, 200);
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
