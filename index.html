<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BABY尋寶趣 出貨單產生器</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  /* 版本快感：2026-03-15-1030 */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'PMingLiU', '新細明體', 'MingLiU', serif; background: #f5f5f5; }
  
  .upload-area {
    max-width: 600px; margin: 40px auto; padding: 40px; text-align: center;
    background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.1);
  }
  .upload-area h1 { font-size: 22px; margin-bottom: 8px; }
  .upload-area p { color: #666; margin-bottom: 20px; }
  .upload-area input[type=file] { display: none; }
  .upload-btn {
    display: inline-block; padding: 12px 32px; background: #e91e63; color: #fff;
    border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold;
  }
  .upload-btn:hover { background: #c2185b; }
  
  .summary {
    max-width: 600px; margin: 20px auto; padding: 20px; background: #fff;
    border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.1);
  }
  .summary h2 { font-size: 18px; margin-bottom: 12px; }
  .summary .stats { display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
  .summary .stat { background: #fce4ec; padding: 12px 20px; border-radius: 8px; }
  .summary .stat .num { font-size: 24px; font-weight: bold; color: #e91e63; }
  .summary .stat .label { font-size: 13px; color: #666; }
  .date-input { margin-bottom: 16px; font-size: 15px; }
  .date-input label { font-weight: bold; margin-right: 8px; }
  .date-input input {
    padding: 8px 12px; font-size: 15px; border: 2px solid #e91e63; border-radius: 6px; font-family: inherit;
  }
  .print-btn {
    padding: 12px 32px; background: #4caf50; color: #fff; border: none;
    border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold;
  }
  .print-btn:hover { background: #388e3c; }
  .reset-btn {
    padding: 12px 24px; background: #9e9e9e; color: #fff; border: none;
    border-radius: 8px; cursor: pointer; font-size: 14px; margin-left: 12px;
  }

  .slips-container { display: block; }

  /* === Shared slip styles === */
  .slip {
    position: relative;
    width: 148mm; 
    height: 210mm; /* 固定高度 A5 */
    background: #fff; border: 1px solid #ccc; margin: 20px auto; padding: 3mm;
    font-size: 13pt; box-shadow: 0 2px 8px rgba(0,0,0,.1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .slip-header-wrapper {
    text-align: center;
    border-bottom: 2px solid #000;
    padding-bottom: 4px;
    margin-bottom: 8px;
    position: relative;
  }
  .slip-header .company {
    font-size: 18pt; font-weight: bold;
    font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
  }
  .slip-header .subtitle {
    font-size: 11pt; color: #333;
  }
  .slip-info { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 13pt; align-items: flex-end; }
  
  .slip table { width: 100%; border-collapse: collapse; font-size: 13pt; table-layout: fixed; }
  .slip th, .slip td { border: 1px solid #000; padding: 2px 4px; text-align: left; }
  .slip th { background: #eee; font-weight: bold; text-align: center; font-size: 11pt; line-height: 1.1; }
  
  .slip td { 
    white-space: nowrap; 
    overflow: hidden; 
    text-overflow: clip; 
    height: 8.2mm; /* 稍微調整以配合 17 行高度 */
    line-height: 7.5mm;
    vertical-align: middle;
  }
  
  .slip td.center { text-align: center; }
  .slip td.compact-price { font-size: 11pt; text-align: center; }
  .slip td.qty-col { font-size: 13pt; text-align: center; }
  
  .col-prod { width: 56%; }
  .col-detail { width: 30%; }
  .col-price { width: 7%; }
  .col-qty { width: 7%; }

  .slip-bottom { 
    margin-top: auto; /* 推到最下面 */
    padding-top: 2mm;
    position: relative;
    height: 38mm; /* 固定底部高度，方便 QR 定位 */
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .slip-footer { font-size: 9pt; color: #333; line-height: 1.3; }
  .slip-footer ul { list-style: disc; padding-left: 14px; margin: 0; }
  .slip-total { font-size: 15pt; font-weight: bold; white-space: nowrap; margin-top: 2mm; }
  
  .slip-qrcode-container {
    position: absolute;
    left: 58%;
    bottom: 2mm;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 30mm;
    transform: translateX(-50%);
  }
  .slip-qrcode-bottom { width: 24mm; height: 24mm; background: #fff; }
  .slip-qrcode-bottom img { width: 100% !important; height: 100% !important; }
  .slip-qrcode-id { font-size: 9pt; font-weight: bold; margin-top: 1mm; color: #000; }

  .badge {
    display: inline-block; color: #000; background: #fff;
    padding: 0px 4px; border: 2.5px solid #000; border-radius: 3px;
    font-size: 9pt; margin-right: 4px; vertical-align: middle; font-weight: bold;
  }

  @media print {
    body { background: #fff; }
    .upload-area, .summary { display: none !important; }
    .slips-container { display: block !important; }
    @page { size: A5 portrait; margin: 0; }
    .slip {
      width: 148mm; height: 210mm;
      padding: 3mm; margin: 0; border: none;
      box-shadow: none; page-break-after: always;
    }
    .slip th { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>

<div class="upload-area" id="uploadArea">
  <h1>📦 BABY尋寶趣 出貨單產生器</h1>
  <p>上傳 Excel 檔案，自動產生所有客戶的出貨單</p>
  <label class="upload-btn" for="fileInput">選擇 Excel 檔案</label>
  <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
</div>

<div class="summary" id="summary" style="display:none;">
  <h2>📊 資料摘要</h2>
  <div class="stats">
    <div class="stat"><div class="num" id="statCustomers">0</div><div class="label">客戶數</div></div>
    <div class="stat"><div class="num" id="statProducts">0</div><div class="label">商品筆數</div></div>
  </div>
  <div class="date-input">
    <label for="closeDate">📅 結單日：</label>
    <input type="date" id="closeDate">
  </div>
  <div class="date-input">
    <label>🖨️ 列印範圍：</label>
    <select id="printMode" onchange="togglePageRange()" style="padding:8px;border:2px solid #e91e63;border-radius:6px;">
      <option value="all">全部客戶</option>
      <option value="range">指定頁數</option>
    </select>
    <span id="pageRangeWrap" style="display:none;margin-left:8px;">
      第 <input type="number" id="pageFrom" min="1" value="1" style="width:60px;padding:6px;border:2px solid #e91e63;border-radius:6px;text-align:center;"> 頁
      到 <input type="number" id="pageTo" min="1" value="1" style="width:60px;padding:6px;border:2px solid #e91e63;border-radius:6px;text-align:center;"> 頁
    </span>
  </div>
  <button class="print-btn" onclick="updateDateAndPrint()">🖨️ 列印出貨單</button>
  <button class="reset-btn" onclick="location.reload()">重新上傳</button>
</div>

<div class="slips-container" id="slipsContainer"></div>

<script>
const COL = { NAME: 0, CUSTOMER: 1, PRICE: 2, QTY: 3, DETAIL: 5, NOTE: 6, ID: 11 };
const LINE_URL = "https://lin.ee/Ou0LFij";
let currentCustomers = [];

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('closeDate').value = new Date().toISOString().split('T')[0];
});

document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const data = new Uint8Array(ev.target.result);
    const wb = XLSX.read(data, { type: 'array' });
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: '' });
    processData(rows);
  };
  reader.readAsArrayBuffer(file);
});

function processData(rows) {
  let startIdx = 0;
  for (let i = 0; i < Math.min(rows.length, 5); i++) {
    if (String(rows[i][COL.ID] || '').trim() && !/客戶|代號/i.test(rows[i][COL.ID])) { startIdx = i; break; }
    startIdx = i + 1;
  }

  const grouped = {};
  for (let i = startIdx; i < rows.length; i++) {
    const row = rows[i];
    const custId = String(row[COL.ID] || '').trim();
    const custName = String(row[COL.CUSTOMER] || '').trim();
    if (!custId && !custName) continue;
    const key = custId || custName;
    if (!grouped[key]) grouped[key] = { id: custId, name: custName, items: [] };
    grouped[key].items.push({
      product: String(row[COL.NAME] || '').trim(),
      detail: String(row[COL.DETAIL] || '').trim(),
      price: row[COL.PRICE],
      qty: row[COL.QTY],
      note: String(row[COL.NOTE] || '').trim()
    });
  }

  currentCustomers = Object.values(grouped);
  document.getElementById('statCustomers').textContent = currentCustomers.length;
  document.getElementById('statProducts').textContent = rows.length - startIdx;
  document.getElementById('summary').style.display = 'block';
  document.getElementById('uploadArea').style.display = 'none';
  renderSlips();
}

function renderSlips() {
  const container = document.getElementById('slipsContainer');
  const dateStr = document.getElementById('closeDate').value.replace(/-/g, '/');
  let html = '';

  currentCustomers.forEach((cust, ci) => {
    // 強制分頁：每 17 行一頁
    const itemsPerPage = 17;
    const totalPages = Math.ceil(cust.items.length / itemsPerPage) || 1;

    for (let p = 0; p < totalPages; p++) {
      const pageItems = cust.items.slice(p * itemsPerPage, (p + 1) * itemsPerPage);
      let rowsHtml = '';
      let pageQty = 0;

      pageItems.forEach(item => {
        const q = Number(item.qty) || 0;
        pageQty += q;
        const note = item.note;
        let badgeHtml = '';
        if (/待補寄/.test(note)) badgeHtml += '<span class="badge">待補寄</span>';
        if (/退款/.test(note)) badgeHtml += '<span class="badge">退款</span>';
        
        rowsHtml += `<tr>
          <td>${badgeHtml}${item.product}</td>
          <td>${item.detail}</td>
          <td class="compact-price">${item.price}</td>
          <td class="qty-col">${q}</td>
        </tr>`;
      });

      // 補足空行維持高度
      for (let i = pageItems.length; i < itemsPerPage; i++) {
        rowsHtml += '<tr><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td></tr>';
      }

      html += `
      <div class="slip" data-page="${ci + 1}">
        <div class="slip-header-wrapper">
          <div class="slip-header">
            <div class="company">༺ BABY尋寶趣 ༻</div>
            <div class="subtitle">✿ 出貨明細單 ✿</div>
          </div>
        </div>
        <div class="slip-info">
          <div>編號：<span style="font-size:20pt;font-weight:bold;">${cust.id}</span></div>
          <div>客戶：${cust.name}</div>
          <div>結單日：${dateStr} ${totalPages > 1 ? `(${p+1}/${totalPages})` : ''}</div>
        </div>
        <table>
          <thead>
            <tr>
              <th style="width:56%">品名</th>
              <th style="width:30%">明細</th>
              <th style="width:7%">單<br>價</th>
              <th style="width:7%">數<br>量</th>
            </tr>
          </thead>
          <tbody>${rowsHtml}</tbody>
        </table>
        <div class="slip-bottom">
          <div class="slip-footer">
            <ul>
              <li>感謝您的訂購！如有任何問題<br>請聯繫 Line官方客服 @574uvbwp</li>
              <li>待補寄：到貨後將盡快補寄給您</li>
              <li>退款：因到貨時間未定，已先行退款避免久候</li>
            </ul>
          </div>
          <div class="slip-qrcode-container">
            <div class="slip-qrcode-bottom" id="qrcode-${ci}-${p}"></div>
            <div class="slip-qrcode-id">@574uvbwp</div>
          </div>
          <div class="slip-total">合計：${p === totalPages - 1 ? cust.items.reduce((a,b)=>a+(Number(b.qty)||0),0) : pageQty} 件</div>
        </div>
      </div>`;
    }
  });

  container.innerHTML = html;
  currentCustomers.forEach((cust, ci) => {
    const totalPages = Math.ceil(cust.items.length / 17) || 1;
    for (let p = 0; p < totalPages; p++) {
      new QRCode(document.getElementById(`qrcode-${ci}-${p}`), { text: LINE_URL, width: 100, height: 100, correctLevel: QRCode.CorrectLevel.H });
    }
  });
}

function togglePageRange() {
  document.getElementById('pageRangeWrap').style.display = document.getElementById('printMode').value === 'range' ? 'inline' : 'none';
}

function updateDateAndPrint() {
  renderSlips();
  const mode = document.getElementById('printMode').value;
  const slips = document.querySelectorAll('.slip');
  if (mode === 'range') {
    const from = parseInt(document.getElementById('pageFrom').value);
    const to = parseInt(document.getElementById('pageTo').value);
    slips.forEach(s => {
      const p = parseInt(s.getAttribute('data-page'));
      s.style.display = (p >= from && p <= to) ? 'flex' : 'none';
    });
  }
  setTimeout(() => { window.print(); slips.forEach(s => s.style.display = 'flex'); }, 300);
}
</script>
</body>
</html>
