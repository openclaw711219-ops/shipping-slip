<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BABY尋寶趣 出貨單產生器</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  /* 版本快感：2026-03-15-0915 */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'PMingLiU', '新細明體', 'MingLiU', serif; background: #f5f5f5; }
  
  .upload-area {
    max-width: 600px; margin: 40px auto; padding: 40px; text-align: center;
    background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.1);
  }
  .upload-area h1 { font-size: 22px; margin-bottom: 8px; }
  .upload-area p { color: #666; margin-bottom: 20px; }
  .upload-area input[type=file] { display: none; }
  .upload-btn {
    display: inline-block; padding: 12px 32px; background: #e91e63; color: #fff;
    border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold;
  }
  .upload-btn:hover { background: #c2185b; }
  
  .summary {
    max-width: 600px; margin: 20px auto; padding: 20px; background: #fff;
    border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.1);
  }
  .summary h2 { font-size: 18px; margin-bottom: 12px; }
  .summary .stats { display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
  .summary .stat { background: #fce4ec; padding: 12px 20px; border-radius: 8px; }
  .summary .stat .num { font-size: 24px; font-weight: bold; color: #e91e63; }
  .summary .stat .label { font-size: 13px; color: #666; }
  .date-input { margin-bottom: 16px; font-size: 15px; }
  .date-input label { font-weight: bold; margin-right: 8px; }
  .date-input input {
    padding: 8px 12px; font-size: 15px; border: 2px solid #e91e63; border-radius: 6px; font-family: inherit;
  }
  .print-btn {
    padding: 12px 32px; background: #4caf50; color: #fff; border: none;
    border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold;
  }
  .print-btn:hover { background: #388e3c; }
  .reset-btn {
    padding: 12px 24px; background: #9e9e9e; color: #fff; border: none;
    border-radius: 8px; cursor: pointer; font-size: 14px; margin-left: 12px;
  }

  .slips-container { display: none; }

  /* === Shared slip styles === */
  .slip {
    position: relative;
    width: 148mm; min-height: 210mm;
    background: #fff; border: 1px solid #ccc; margin: 20px auto; padding: 3mm; /* 恢復 3mm 邊距 */
    font-size: 13pt; box-shadow: 0 2px 8px rgba(0,0,0,.1);
    display: flex;
    flex-direction: column;
  }

  .slip-header-wrapper {
    text-align: center;
    /* 去除編號上的黑線 border-bottom: 2px solid #000; */
    padding-bottom: 2px;
    margin-bottom: 4px;
    position: relative;
  }
  .slip-header { flex: 1; }

  .slip-header .company {
    font-size: 18pt; font-weight: bold;
    font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
    margin-top: -2mm; /* 往上挪 */
  }
  .slip-header .subtitle {
    font-size: 11pt; color: #333;
    font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
    margin-top: -1mm; /* 縮小間距 */
  }
  .slip-info { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 13pt; }
  
  .slip table { width: 100%; border-collapse: collapse; font-size: 13pt; table-layout: fixed; }
  .slip th, .slip td { border: 1px solid #000; padding: 2px 4px; text-align: left; }
  .slip th { background: #eee; font-weight: bold; text-align: center; line-height: 1.2; }
  
  .slip td { 
    white-space: nowrap; 
    overflow: hidden; 
    text-overflow: clip; 
    height: 7.5mm; /* 微調高度以確保 17 行能放下 */
    line-height: 7mm;
    vertical-align: middle;
  }
  
  .slip td.center { text-align: center; }
  /* 單價與數量欄位：字體 11pt，表頭垂直呈現 */
  .slip td.compact-price, .slip th.compact-price,
  .slip td.qty-col, .slip th.qty-col { 
    font-size: 11pt; 
    white-space: normal; 
    padding: 2px; 
    text-align: center; 
    word-break: break-all;
  }
  
  .col-prod { width: 56%; }
  .col-detail { width: 30%; }
  .col-price { width: 7%; }
  .col-qty { width: 7%; }

  .slip-bottom { display: flex; justify-content: space-between; align-items: flex-start; margin-top: 1mm; }
  .slip-footer { font-size: 9pt; color: #333; flex: 1; }
  .slip-footer ul { list-style: disc; padding-left: 14px; margin: 0; }
  .slip-footer li { margin-bottom: 1px; }
  .slip-total { font-size: 15pt; font-weight: bold; white-space: nowrap; padding-left: 12px; }
  .badge {
    display: inline-block; color: #000; background: #fff;
    padding: 0px 4px; border: 2px solid #000; border-radius: 3px;
    font-size: 9pt; margin-right: 4px; vertical-align: middle; font-weight: bold;
  }

  @media print {
    body { background: #fff; }
    .upload-area, .summary { display: none !important; }
    .slips-container { display: block !important; }
    @page { size: A5 portrait; margin: 0; }
    .slip .page-num { display: none !important; }
    .slip {
      width: 148mm;
      min-height: 210mm;
      height: auto;
      font-size: 13pt;
      padding: 3mm; /* 頭尾左右均為 3mm */
      margin: 0;
      border: none;
      box-sizing: border-box;
      box-shadow: none;
      page-break-after: always;
    }
    .slip table { page-break-inside: auto; }
    .slip tr { page-break-inside: avoid; page-break-after: auto; }
    .slip thead { display: table-header-group; }
    .slip-bottom { page-break-inside: avoid; }
    .slip th { background: #eee !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>

<div class="upload-area" id="uploadArea">
  <h1>📦 BABY尋寶趣 出貨單產生器</h1>
  <p>上傳 Excel 檔案，自動產生所有客戶的出貨單</p>
  <label class="upload-btn" for="fileInput">選擇 Excel 檔案</label>
  <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
  <p style="margin-top:12px;font-size:13px;color:#999;">支援 .xlsx / .xls / .csv</p>
</div>

<div class="summary" id="summary" style="display:none;">
  <h2>📊 資料摘要</h2>
  <div class="stats">
    <div class="stat"><div class="num" id="statCustomers">0</div><div class="label">客戶數</div></div>
    <div class="stat"><div class="num" id="statProducts">0</div><div class="label">商品筆數</div></div>
    <div class="stat"><div class="num" id="statBackorder">0</div><div class="label">待補寄/退款</div></div>
  </div>
  <div class="date-input">
    <label for="closeDate">📅 結單日：</label>
    <input type="date" id="closeDate">
  </div>
  <div class="date-input" style="margin-top:8px;">
    <label>🖨️ 列印範圍：</label>
    <select id="printMode" onchange="togglePageRange()" style="padding:8px;font-size:15px;border:2px solid #e91e63;border-radius:6px;">
      <option value="all">全部客戶</option>
      <option value="range">指定頁數</option>
    </select>
    <span id="pageRangeWrap" style="display:none;margin-left:8px;">
      第 <input type="number" id="pageFrom" min="1" value="1" style="width:60px;padding:6px;font-size:15px;border:2px solid #e91e63;border-radius:6px;text-align:center;"> 頁
      到 <input type="number" id="pageTo" min="1" value="1" style="width:60px;padding:6px;font-size:15px;border:2px solid #e91e63;border-radius:6px;text-align:center;"> 頁
      <span id="pageTotal" style="color:#999;font-size:13px;margin-left:4px;"></span>
    </span>
  </div>
  <button class="print-btn" onclick="updateDateAndPrint()">🖨️ 列印出貨單</button>
  <button class="reset-btn" onclick="location.reload()">重新上傳</button>
</div>

<div class="slips-container preview" id="slipsContainer"></div>

<script>
const COL = { NAME: 0, CUSTOMER: 1, PRICE: 2, QTY: 3, AMOUNT: 4, DETAIL: 5, NOTE: 6, ID: 11 };

let currentCustomers = [];

document.addEventListener('DOMContentLoaded', () => {
  const today = new Date();
  document.getElementById('closeDate').value = today.toISOString().split('T')[0];
});

document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = new Uint8Array(ev.target.result);
      const wb = XLSX.read(data, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      processData(raw);
    } catch (err) {
      console.error(err);
      alert('讀取檔案失敗，請確認檔案格式是否正確。');
    }
  };
  reader.readAsArrayBuffer(file);
});

function parseNote(note) {
  note = String(note || '').trim();
  if (!note) return { badges: [] };
  const badges = [];
  if (/待補寄/.test(note)) badges.push({ label: '待補寄', cls: 'badge-backorder' });
  if (/退款/.test(note)) badges.push({ label: '退款', cls: 'badge-refund' });
  if (/贈品/.test(note)) badges.push({ label: '贈品', cls: 'badge-gift' });
  if (badges.length === 0 && note) badges.push({ label: note, cls: 'badge-other' });
  return { badges };
}

function processData(rows) {
  if (!rows || rows.length === 0) return;
  
  let startIdx = 0;
  for (let i = 0; i < Math.min(rows.length, 5); i++) {
    const id = String(rows[i][COL.ID] || '').trim();
    if (id && !/客戶|代號|編號/i.test(id)) { startIdx = i; break; }
    startIdx = i + 1;
  }

  const grouped = {};
  let totalProducts = 0;
  let backorderCount = 0;

  for (let i = startIdx; i < rows.length; i++) {
    const row = rows[i];
    const custId = String(row[COL.ID] || '').trim();
    const custName = String(row[COL.CUSTOMER] || '').trim();
    if (!custId && !custName) continue;

    const key = custId || custName;
    if (!grouped[key]) {
      grouped[key] = { id: custId, name: custName, items: [] };
    }

    const note = String(row[COL.NOTE] || '').trim();
    if (/待補寄|退款/.test(note)) backorderCount++;

    grouped[key].items.push({
      product: String(row[COL.NAME] || '').trim(),
      detail: String(row[COL.DETAIL] || '').trim(),
      price: row[COL.PRICE],
      qty: row[COL.QTY],
      note: note
    });
    totalProducts++;
  }

  currentCustomers = Object.values(grouped);
  document.getElementById('statCustomers').textContent = currentCustomers.length;
  document.getElementById('statProducts').textContent = totalProducts;
  document.getElementById('statBackorder').textContent = backorderCount;
  document.getElementById('summary').style.display = 'block';
  document.getElementById('uploadArea').style.display = 'none';

  renderSlips();
}

function getDateStr() {
  const val = document.getElementById('closeDate').value;
  if (!val) return '';
  const d = new Date(val);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

function renderSlips() {
  const container = document.getElementById('slipsContainer');
  container.style.display = 'block';
  const dateStr = getDateStr();

  let html = '';
  const total = currentCustomers.length;
  currentCustomers.forEach((cust, ci) => {
    const pageNum = ci + 1;
    let totalQty = 0;

    let rowsHtml = '';
    cust.items.forEach((item) => {
      const qty = Number(item.qty) || 0;
      totalQty += qty;

      const { badges } = parseNote(item.note);
      let badgeHtml = badges.map(b => `<span class="badge ${b.cls}">${b.label}</span>`).join('');
      let productDisplay = badgeHtml + item.product;
      const priceDisplay = item.price !== '' && item.price != null ? `${Number(item.price).toLocaleString()}` : '';

      rowsHtml += `<tr>
        <td style="width:56%">${productDisplay}</td>
        <td style="width:30%">${item.detail}</td>
        <td class="compact-price" style="width:7%">${priceDisplay}</td>
        <td class="qty-col" style="width:7%">${qty}</td>
      </tr>`;
    });

    html += `
    <div class="slip">
      <div class="slip-header-wrapper">
        <div class="slip-header">
          <div class="company">༺ BABY尋寶趣 ༻</div>
          <div class="subtitle">✿ 出貨明細單 ✿</div>
        </div>
      </div>
      <div class="slip-info">
        <div>編號：<span style="font-size:16pt;font-weight:bold;">${cust.id}</span></div>
        <div>客戶：<span style="font-size:11pt;">${cust.name}</span></div>
        <div>結單日：<span style="font-size:11pt;">${dateStr}</span></div>
      </div>
      <table>
        <thead>
          <tr>
            <th style="width:56%">品名</th>
            <th style="width:30%;font-size:11pt;">明細</th>
            <th style="width:7%;" class="compact-price">單<br>價</th>
            <th style="width:7%;" class="qty-col">數<br>量</th>
          </tr>
        </thead>
        <tbody>${rowsHtml}</tbody>
      </table>
      <div class="slip-bottom">
        <div class="slip-footer">
          <ul>
            <li>感謝您的訂購！如有任何問題，請聯繫 Line官方客服 @574uvbwp</li>
            <li>待補寄：到貨後將盡快補寄給您</li>
            <li>退款：因到貨時間未定，已先行退款避免久候</li>
          </ul>
        </div>
        <div class="slip-total">合計：${totalQty} 件</div>
      </div>
    </div>`;
  });

  container.innerHTML = html;
}

function togglePageRange() {
  const mode = document.getElementById('printMode').value;
  document.getElementById('pageRangeWrap').style.display = mode === 'range' ? 'inline' : 'none';
  if (mode === 'range') {
    document.getElementById('pageTo').value = currentCustomers.length;
    document.getElementById('pageTotal').textContent = `(共 ${currentCustomers.length}頁)`;
  }
}

function updateDateAndPrint() {
  renderSlips();
  const mode = document.getElementById('printMode').value;
  const slips = document.querySelectorAll('#slipsContainer .slip');
  
  if (mode === 'range') {
    const from = parseInt(document.getElementById('pageFrom').value) || 1;
    const to = parseInt(document.getElementById('pageTo').value) || currentCustomers.length;
    slips.forEach((slip, i) => {
      const page = i + 1;
      if (page >= from && page <= to) {
        slip.style.display = 'flex';
      } else {
        slip.style.display = 'none';
      }
    });
  } else {
    slips.forEach(s => s.style.display = 'flex');
  }

  setTimeout(() => {
    window.print();
    slips.forEach(s => s.style.display = 'flex');
  }, 300);
}

document.getElementById('closeDate')?.addEventListener('change', renderSlips);
</script>
</body>
</html>
