<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BABY尋寶趣 出貨單產生器</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  /* === UI styles === */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif; background: #f5f5f5; }
  
  .upload-area {
    max-width: 600px; margin: 40px auto; padding: 40px; text-align: center;
    background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.1);
  }
  .upload-area h1 { font-size: 22px; margin-bottom: 8px; }
  .upload-area p { color: #666; margin-bottom: 20px; }
  .upload-area input[type=file] { display: none; }
  .upload-btn {
    display: inline-block; padding: 12px 32px; background: #e91e63; color: #fff;
    border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold;
  }
  .upload-btn:hover { background: #c2185b; }
  
  .summary {
    max-width: 600px; margin: 20px auto; padding: 20px; background: #fff;
    border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.1);
  }
  .summary h2 { font-size: 18px; margin-bottom: 12px; }
  .summary .stats { display: flex; gap: 20px; margin-bottom: 16px; }
  .summary .stat { background: #fce4ec; padding: 12px 20px; border-radius: 8px; }
  .summary .stat .num { font-size: 24px; font-weight: bold; color: #e91e63; }
  .summary .stat .label { font-size: 13px; color: #666; }
  .print-btn {
    padding: 12px 32px; background: #4caf50; color: #fff; border: none;
    border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold;
  }
  .print-btn:hover { background: #388e3c; }
  .reset-btn {
    padding: 12px 24px; background: #9e9e9e; color: #fff; border: none;
    border-radius: 8px; cursor: pointer; font-size: 14px; margin-left: 12px;
  }

  /* === Print: A5 slips === */
  .slips-container { display: none; }

  @media print {
    body { background: #fff; }
    .upload-area, .summary { display: none !important; }
    .slips-container { display: block !important; }

    @page {
      size: A5 landscape;
      margin: 8mm;
    }

    .slip {
      page-break-after: always;
      width: 100%; height: 100%;
      font-size: 13pt;
      position: relative;
    }
    .slip:last-child { page-break-after: avoid; }

    .slip-header {
      text-align: center; border-bottom: 2px solid #000; padding-bottom: 6px; margin-bottom: 8px;
    }
    .slip-header .company { font-size: 18pt; font-weight: bold; }
    .slip-header .subtitle { font-size: 11pt; color: #333; }

    .slip-info {
      display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13pt;
    }

    .slip table {
      width: 100%; border-collapse: collapse; font-size: 13pt;
    }
    .slip th, .slip td {
      border: 1px solid #000; padding: 4px 6px; text-align: left;
    }
    .slip th { background: #eee; font-weight: bold; text-align: center; }
    .slip td.center { text-align: center; }
    .slip td.right { text-align: right; }

    .slip-footer {
      margin-top: 8px; font-size: 11pt; border-top: 1px dashed #000; padding-top: 6px;
    }
    .slip-footer .notice { margin-top: 4px; }
    .slip-total {
      text-align: right; font-size: 14pt; font-weight: bold; margin-top: 6px;
    }
    .slip .backorder-badge {
      display: inline-block; background: #000; color: #fff; padding: 1px 6px;
      border-radius: 3px; font-size: 10pt; margin-left: 4px;
    }
  }

  /* Preview on screen */
  .preview .slip {
    width: 210mm; min-height: 148mm; 
    background: #fff; border: 1px solid #ccc; margin: 20px auto; padding: 8mm;
    font-size: 13pt; box-shadow: 0 2px 8px rgba(0,0,0,.1);
  }
  .preview .slip-header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 6px; margin-bottom: 8px; }
  .preview .slip-header .company { font-size: 18pt; font-weight: bold; }
  .preview .slip-header .subtitle { font-size: 11pt; color: #333; }
  .preview .slip-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13pt; }
  .preview table { width: 100%; border-collapse: collapse; font-size: 13pt; }
  .preview th, .preview td { border: 1px solid #000; padding: 4px 6px; text-align: left; }
  .preview th { background: #eee; font-weight: bold; text-align: center; }
  .preview td.center { text-align: center; }
  .preview td.right { text-align: right; }
  .preview .slip-footer { margin-top: 8px; font-size: 11pt; border-top: 1px dashed #000; padding-top: 6px; }
  .preview .slip-total { text-align: right; font-size: 14pt; font-weight: bold; margin-top: 6px; }
  .preview .backorder-badge {
    display: inline-block; background: #000; color: #fff; padding: 1px 6px;
    border-radius: 3px; font-size: 10pt; margin-left: 4px;
  }
</style>
</head>
<body>

<div class="upload-area" id="uploadArea">
  <h1>📦 BABY尋寶趣 出貨單產生器</h1>
  <p>上傳 Excel 檔案，自動產生所有客戶的出貨單</p>
  <label class="upload-btn" for="fileInput">選擇 Excel 檔案</label>
  <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
  <p style="margin-top:12px;font-size:13px;color:#999;">支援 .xlsx / .xls / .csv</p>
</div>

<div class="summary" id="summary" style="display:none;">
  <h2>📊 資料摘要</h2>
  <div class="stats">
    <div class="stat"><div class="num" id="statCustomers">0</div><div class="label">客戶數</div></div>
    <div class="stat"><div class="num" id="statProducts">0</div><div class="label">商品筆數</div></div>
    <div class="stat"><div class="num" id="statBackorder">0</div><div class="label">待補寄/退款</div></div>
  </div>
  <button class="print-btn" onclick="window.print()">🖨️ 列印全部出貨單</button>
  <button class="reset-btn" onclick="location.reload()">重新上傳</button>
</div>

<div class="slips-container preview" id="slipsContainer"></div>

<script>
const COL = { NAME: 0, CUSTOMER: 1, PRICE: 2, QTY: 3, AMOUNT: 4, DETAIL: 5, NOTE: 6, ID: 11 };
// A=0 品名, B=1 客戶名, C=2 單價, D=3 數量, E=4 金額, F=5 明細, G=6 備註, L=11 客戶代號

document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const wb = XLSX.read(ev.target.result, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    processData(raw);
  };
  reader.readAsArrayBuffer(file);
});

function processData(rows) {
  // Skip header row(s) — find first row with data in column L
  let startIdx = 0;
  for (let i = 0; i < Math.min(rows.length, 5); i++) {
    const id = String(rows[i][COL.ID] || '').trim();
    if (id && !/客戶|代號|編號/i.test(id)) { startIdx = i; break; }
    startIdx = i + 1;
  }

  const grouped = {};
  let totalProducts = 0;
  let backorderCount = 0;

  for (let i = startIdx; i < rows.length; i++) {
    const row = rows[i];
    const custId = String(row[COL.ID] || '').trim();
    const custName = String(row[COL.CUSTOMER] || '').trim();
    if (!custId && !custName) continue; // skip empty

    const key = custId || custName;
    if (!grouped[key]) {
      grouped[key] = { id: custId, name: custName, items: [] };
    }

    const note = String(row[COL.NOTE] || '').trim();
    const isBackorder = /待補寄/.test(note);
    const isRefund = /退款/.test(note);
    if (isBackorder || isRefund) backorderCount++;

    grouped[key].items.push({
      product: String(row[COL.NAME] || '').trim(),
      detail: String(row[COL.DETAIL] || '').trim(),
      price: row[COL.PRICE],
      qty: row[COL.QTY],
      note: note,
      isBackorder: isBackorder,
      isRefund: isRefund
    });
    totalProducts++;
  }

  const customers = Object.values(grouped);
  document.getElementById('statCustomers').textContent = customers.length;
  document.getElementById('statProducts').textContent = totalProducts;
  document.getElementById('statBackorder').textContent = backorderCount;
  document.getElementById('summary').style.display = 'block';
  document.getElementById('uploadArea').style.display = 'none';

  renderSlips(customers);
}

function renderSlips(customers) {
  const container = document.getElementById('slipsContainer');
  container.style.display = 'block';
  const today = new Date();
  const dateStr = `${today.getFullYear()}/${String(today.getMonth()+1).padStart(2,'0')}/${String(today.getDate()).padStart(2,'0')}`;

  let html = '';
  for (const cust of customers) {
    let totalQty = 0;
    let hasBackorder = false;
    let hasRefund = false;

    let rowsHtml = '';
    cust.items.forEach((item, idx) => {
      const qty = Number(item.qty) || 0;
      totalQty += qty;
      if (item.isBackorder) hasBackorder = true;
      if (item.isRefund) hasRefund = true;

      const priceDisplay = item.price !== '' && item.price != null ? `$${Number(item.price).toLocaleString()}` : '';
      let noteDisplay = '';
      if (item.isBackorder) noteDisplay += '<span class="backorder-badge">待補寄</span>';
      if (item.isRefund) noteDisplay += '<span class="backorder-badge">退款</span>';
      if (item.note && !item.isBackorder && !item.isRefund) noteDisplay = item.note;

      rowsHtml += `<tr>
        <td class="center">${idx + 1}</td>
        <td>${item.product}</td>
        <td>${item.detail}</td>
        <td class="right">${priceDisplay}</td>
        <td class="center">${qty}</td>
        <td class="center">${noteDisplay}</td>
      </tr>`;
    });

    let noticeHtml = '';
    if (hasBackorder || hasRefund) {
      noticeHtml = '<div class="notice">⚠️ ';
      if (hasBackorder) noticeHtml += '標示「待補寄」之品項將於到貨後盡速補寄。';
      if (hasRefund) noticeHtml += '標示「退款」之品項將另行處理退款。';
      noticeHtml += '</div>';
    }

    html += `
    <div class="slip">
      <div class="slip-header">
        <div class="company">BABY尋寶趣</div>
        <div class="subtitle">出貨明細單</div>
      </div>
      <div class="slip-info">
        <div><strong>客戶代號：</strong>${cust.id}</div>
        <div><strong>客戶名稱：</strong>${cust.name}</div>
        <div><strong>日期：</strong>${dateStr}</div>
      </div>
      <table>
        <thead>
          <tr>
            <th style="width:6%">#</th>
            <th style="width:28%">品名</th>
            <th style="width:24%">明細</th>
            <th style="width:14%">單價</th>
            <th style="width:10%">數量</th>
            <th style="width:18%">備註</th>
          </tr>
        </thead>
        <tbody>${rowsHtml}</tbody>
      </table>
      <div class="slip-total">合計數量：${totalQty} 件</div>
      <div class="slip-footer">
        <div>📦 感謝您的訂購！如有任何問題，請聯繫 BABY尋寶趣 客服。</div>
        ${noticeHtml}
      </div>
    </div>`;
  }

  container.innerHTML = html;
}
</script>
</body>
</html>
